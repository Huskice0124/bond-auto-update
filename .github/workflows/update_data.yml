name: Update Bond Prices

on:
  schedule:
    # 台灣時間週一至週五 14:00 (UTC 6:00) 自動執行
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 讓你可以點擊按鈕手動測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 建議使用較新版本

      - name: Set up Python
        uses: actions/setup-python@v5 # 支援 Python 3.12
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase yfinance pandas python-dotenv

      - name: Run update script
        env:
          # 這兩個變數會去抓取你在 GitHub Repository -> Settings -> Secrets 裡設定的值
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_bonds.py